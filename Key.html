<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGG AES-256-CBC Token Encryptor/Decryptor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #34495e;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: monospace;
        }
        textarea {
            resize: vertical;
            height: 80px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-encrypt { background-color: #27ae60; }
        .btn-encrypt:hover { background-color: #219653; }
        .btn-decrypt { background-color: #2980b9; }
        .btn-decrypt:hover { background-color: #2471a3; }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #eef2f5;
            border-left: 5px solid #2c3e50;
            border-radius: 4px;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>PGG License Tool (2026)</h2>
    
    <div class="form-group">
        <label for="secretKey">Secret Key (กุญแจหลักที่ใช้ในระบบ C++):</label>
        <input type="text" id="secretKey" value="PGG_INTERNAL_SECRET_2026">
    </div>

    <div class="form-group">
        <label for="inputText">ข้อความที่ต้องการประมวลผล (IP Address หรือ Token ที่เข้ารหัสแล้ว):</label>
        <textarea id="inputText" placeholder="เช่น 127.0.0.1 หรือใส่ Base64 Token เพื่อถอดรหัส"></textarea>
    </div>

    <div class="btn-group">
        <button class="btn-encrypt" onclick="processCrypto(true)">🔒 เข้ารหัส (Encrypt to Token)</button>
        <button class="btn-decrypt" onclick="processCrypto(false)">🔓 ถอดรหัส (Decrypt to IP)</button>
    </div>

    <div class="result-box">
        <strong>ผลลัพธ์ (Result):</strong>
        <p id="outputResult" style="font-family: monospace; margin-top: 10px; color: #c0392b;">- ยังไม่มีข้อมูล -</p>
    </div>
</div>

<script>
    function processCrypto(isEncrypt) {
        const keyText = document.getElementById('secretKey').value;
        const inputText = document.getElementById('inputText').value.trim();
        const outputElement = document.getElementById('outputResult');

        if (!keyText || !inputText) {
            outputElement.innerText = "กรุณากรอกข้อมูลให้ครบถ้วนทั้ง Secret Key และ ข้อความ";
            return;
        }

        try {
            // 1. แฮชคีย์ด้วย SHA-256 เพื่อสร้างคีย์ดิบขนาด 32 ไบต์ให้สัมพันธ์กับ CryptCreateHash ในฝั่ง C++
            const hashedKey = CryptoJS.SHA256(keyText);

            // 2. ดึง 16 ไบต์แรกของแฮชมาใช้เป็น Vector เริ่มต้น (IV) เหมือนคำสั่ง memcpy ในตัวโปรแกรม
            const ivWords = CryptoJS.lib.WordArray.create(hashedKey.words.slice(0, 4), 16);

            if (isEncrypt) {
                // ขบวนการสร้างตัวเข้ารหัสลับ
                const encrypted = CryptoJS.AES.encrypt(inputText, hashedKey, {
                    iv: ivWords,
                    mode: CryptoJS.mode.CBC,
                    padding: CryptoJS.pad.Pkcs7
                });
                
                outputElement.innerText = encrypted.toString();
                outputElement.style.color = "#27ae60";

            } else {
                // ขบวนการถอดกลับสารสนเทศ
                const decrypted = CryptoJS.AES.decrypt(inputText, hashedKey, {
                    iv: ivWords,
                    mode: CryptoJS.mode.CBC,
                    padding: CryptoJS.pad.Pkcs7
                });

                const plainText = decrypted.toString(CryptoJS.enc.Utf8);
                
                if (plainText) {
                    outputElement.innerText = plainText;
                    outputElement.style.color = "#2980b9";
                } else {
                    outputElement.innerText = "[ข้อผิดพลาด] ถอดรหัสไม่สำเร็จ! คีย์ไม่ถูกต้อง หรือรูปแบบ Token ผิดพลาด";
                    outputElement.style.color = "#c0392b";
                }
            }
        } catch (error) {
            outputElement.innerText = "[ข้อผิดพลาดระบบ] " + error.message;
            outputElement.style.color = "#c0392b";
        }
    }
</script>

</body>
</html>
